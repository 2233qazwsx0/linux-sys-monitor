name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build Linux binary
        run: |
          cargo build --release
          cp target/release/linux-system-monitor release/
      
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
          cd ..
      
      - name: Create package
        run: |
          cp setup.sh release/
          tar -czvf release/linux-system-monitor-${{ github.ref_name }}-linux-x86_64.tar.gz -C release linux-system-monitor frontend_dist setup.sh
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Add Windows target
        run: rustup target add x86_64-pc-windows-gnu
      
      - name: Build Windows binary
        run: cargo build --release --target x86_64-pc-windows-gnu
      
      - name: Upload Windows binary
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/x86_64-pc-windows-gnu/release/system-monitor-installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
