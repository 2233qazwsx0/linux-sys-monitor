[package]
name = "linux-system-monitor"
version = "2.0.0"
edition = "2021"
description = "Real-time Linux/Windows system monitoring with Web UI"
license = "MIT"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
axum = { version = "0.7", features = ["ws"] }
tower-http = { version = "0.5", features = ["cors", "fs"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sysinfo = "0.30"
chrono = { version = "0.4", features = ["serde"] }
parking_lot = "0.12"
tracing = "0.1"
tracing-subscriber = "0.3"
futures-util = "0.3"

[profile.release]
opt-level = 3
lto = true
